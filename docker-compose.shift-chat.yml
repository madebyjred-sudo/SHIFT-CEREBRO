# ═══════════════════════════════════════════════════════════════
# Shift Chat — Docker Compose for Hostinger VPS
# Based on LobeChat official docker-compose/dev/docker-compose.yml
# ═══════════════════════════════════════════════════════════════
#
# USAGE:
#   1. Copy this file + .env.shift-chat to your VPS
#   2. Fill in secrets in .env.shift-chat
#   3. docker compose -f docker-compose.shift-chat.yml --env-file .env.shift-chat up -d
#
# ARCHITECTURE:
#   LobeChat (Next.js) → OPENAI_PROXY_URL → Cerebro (Railway)
#   LobeChat → AGENTS_INDEX_URL → Cerebro /market/agents.json
#   LobeChat → PostgreSQL 17 (local) + RustFS/MinIO (local S3)
#
name: shift-chat

services:
  # ─── Network Service (port proxy) ────────────────────────
  network-service:
    image: alpine
    container_name: shift-network
    restart: always
    ports:
      - '${RUSTFS_PORT:-9000}:9000'   # RustFS API
      - '9001:9001'                     # RustFS Console
      - '${LOBE_PORT:-3210}:3210'      # LobeChat UI
    command: tail -f /dev/null
    networks:
      - shift-network
    env_file:
      - .env.shift-chat

  # ─── PostgreSQL 17 + pg_search ───────────────────────────
  postgresql:
    image: paradedb/paradedb:latest-pg17
    container_name: shift-postgres
    ports:
      - '5432:5432'
    volumes:
      - './data/postgres:/var/lib/postgresql/data'
    environment:
      - 'POSTGRES_DB=${LOBE_DB_NAME:-shift_chat}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - shift-network

  # ─── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shift-redis
    ports:
      - '6379:6379'
    command: redis-server --save 60 1000 --appendonly yes
    volumes:
      - 'redis_data:/data'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - shift-network

  # ─── RustFS (S3-compatible storage for file uploads) ─────
  rustfs:
    image: rustfs/rustfs:latest
    container_name: shift-rustfs
    network_mode: 'service:network-service'
    environment:
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9000/health >/dev/null 2>&1 || exit 1']
      interval: 5s
      timeout: 3s
      retries: 30
    command: ['--access-key','${RUSTFS_ACCESS_KEY}','--secret-key','${RUSTFS_SECRET_KEY}','/data']

  # ─── RustFS Init (create bucket) ────────────────────────
  rustfs-init:
    image: minio/mc:latest
    container_name: shift-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: /bin/sh
    command: -c '
        set -eux;
        mc alias set rustfs "http://network-service:9000" "${RUSTFS_ACCESS_KEY}" "${RUSTFS_SECRET_KEY}";
        mc mb "rustfs/${S3_BUCKET:-shift-chat}" --ignore-existing;
        mc anonymous set download "rustfs/${S3_BUCKET:-shift-chat}";
      '
    restart: 'no'
    networks:
      - shift-network
    env_file:
      - .env.shift-chat

  # ─── LobeChat (Next.js app) ─────────────────────────────
  # NOTE: Build from shift-chat-fork or use lobehub/lobe-chat:latest
  # For rebrand: build from your fork with modified branding.ts
  lobe-chat:
    image: lobehub/lobe-chat-database:latest
    container_name: shift-lobe-chat
    network_mode: 'service:network-service'
    depends_on:
      postgresql:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.shift-chat
    restart: always

volumes:
  data:
    driver: local
  redis_data:
    driver: local
  rustfs-data:
    driver: local

networks:
  shift-network:
    driver: bridge
